<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MobileUpload — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0d0d0d;
      background-image:
        radial-gradient(ellipse at 15% 40%, rgba(184,142,40,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 60%, rgba(184,142,40,0.06) 0%, transparent 55%);
      font-family: 'Montserrat', sans-serif;
      color: #c9a84c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 480px;
    }

    .ornament {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px; opacity: 0.5; width: 100%;
    }
    .ornament-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c);
    }
    .ornament-line.r { background: linear-gradient(to left, transparent, #c9a84c); }
    .ornament-diamond {
      width: 8px; height: 8px;
      border: 1px solid #c9a84c;
      transform: rotate(45deg);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      background: linear-gradient(135deg, #9a7a28 0%, #e8c96d 40%, #f5e090 55%, #c9a84c 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 6px; text-align: center;
    }

    .domain {
      font-size: 0.6rem; font-weight: 200;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: #7a6030; margin-bottom: 12px;
    }

    .description {
      font-size: 0.65rem; font-weight: 300;
      letter-spacing: 0.15em; line-height: 1.9;
      color: rgba(201,168,76,0.45);
      text-align: center; margin-bottom: 48px;
      max-width: 340px;
    }

    #uploader { width: 100%; display: flex; justify-content: center; }

    /* ── Selector panel (shown when no docType is in the URL) ── */
    .selector {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 8px;
    }

    .sel-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 16px 18px;
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 4px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .sel-item:hover {
      border-color: rgba(201,168,76,0.5);
      background: rgba(201,168,76,0.04);
    }

    .sel-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sel-doc-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #9a7a28 0%, #e8c96d 40%, #f5e090 55%, #c9a84c 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .sel-badge {
      font-size: 0.45rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.4);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sel-url {
      font-size: 0.55rem;
      font-weight: 200;
      letter-spacing: 0.08em;
      color: rgba(201,168,76,0.35);
      word-break: break-all;
      font-family: 'Courier New', monospace;
    }

    .footer-divider {
      display: flex; align-items: center; gap: 8px;
      width: 100%; margin-top: 52px; margin-bottom: 20px; opacity: 0.25;
    }
    .footer-divider-line { flex: 1; height: 1px; background: rgba(201,168,76,0.4); }
    .footer-divider-dot { width: 3px; height: 3px; border-radius: 50%; background: #c9a84c; }

    .footer {
      font-size: 0.52rem; font-weight: 200;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: rgba(201,168,76,0.25);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>

    <h1>MobileUpload</h1>
    <div class="domain">vendeoro.com</div>

    <p class="description" id="desc">
      Escanea el código QR con tu dispositivo móvil<br/>
      para enviar fotografías directamente a esta pantalla
    </p>

    <!-- Shown when no docType is given -->
    <div class="selector" id="selector" style="display:none"></div>

    <!-- Shown when a valid docType is given -->
    <div id="uploader"></div>

    <div class="footer-divider">
      <div class="footer-divider-line"></div>
      <div class="footer-divider-dot"></div>
      <div class="footer-divider-line"></div>
    </div>
    <div class="footer">Envío de imágenes · Red local</div>
  </div>

  <script src="/widget.js"></script>
  <script>
    // ── URL parameter ────────────────────────────────────────────────────────
    // ?docType=dni|nie|driver|passport
    //
    // When docType is absent the page shows a selector with the available URLs.
    // When docType is present the widget launches immediately in that mode.
    //
    // Modes:
    //   dni      — 2 photos (front + back)  Spanish DNI
    //   nie      — 2 photos (front + back)  NIE
    //   driver   — 2 photos (front + back)  Permiso de conducir
    //   passport — 1 photo                  Pasaporte

    const DOC_LABELS = {
      dni:      { name: 'DNI',                 badge: '2 fotos · anverso + reverso' },
      nie:      { name: 'NIE',                 badge: '2 fotos · anverso + reverso' },
      driver:   { name: 'Permiso de conducir', badge: '2 fotos · anverso + reverso' },
      passport: { name: 'Pasaporte',           badge: '1 foto' },
    };

    const VALID_DOC_TYPES = Object.keys(DOC_LABELS);
    const pageParams = new URLSearchParams(window.location.search);
    const rawDocType = pageParams.get('docType');

    if (VALID_DOC_TYPES.includes(rawDocType)) {
      // ── Widget mode ──────────────────────────────────────────────────────
      document.getElementById('desc').textContent =
        'Escanea el código QR con tu dispositivo móvil para enviar el documento.';

      MobileUpload.init('uploader', { serverUrl: window.location.origin, docType: rawDocType })
        .then(urls => console.log('Fotos recibidas:', urls));

    } else {
      // ── Selector mode ────────────────────────────────────────────────────
      document.getElementById('desc').textContent =
        'Selecciona el tipo de documento que deseas escanear.';

      const base = window.location.origin + window.location.pathname;
      const sel  = document.getElementById('selector');
      sel.style.display = 'flex';

      VALID_DOC_TYPES.forEach(dt => {
        const { name, badge } = DOC_LABELS[dt];
        const url = `${base}?docType=${dt}`;
        const a   = document.createElement('a');
        a.className = 'sel-item';
        a.href      = url;
        a.innerHTML = `
          <div class="sel-item-header">
            <span class="sel-doc-name">${name}</span>
            <span class="sel-badge">${badge}</span>
          </div>
          <div class="sel-url">${url}</div>`;
        sel.appendChild(a);
      });
    }
  </script>
</body>
</html>
