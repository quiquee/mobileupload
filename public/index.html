<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MobileUpload - Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #04060b;
      --panel: #10141d;
      --panel-2: #0b1018;
      --line: rgba(255, 255, 255, 0.1);
      --text: #e9edf5;
      --muted: #96a2b8;
      --gold: #cfad63;
      --accent: #4f8cff;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 0%, rgba(60, 84, 126, 0.35), transparent 45%), var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      padding: 20px;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      height: fit-content;
      position: sticky;
      top: 20px;
    }

    .brand {
      font-family: 'Outfit', sans-serif;
      color: var(--gold);
      font-size: 2.2rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .side p {
      color: var(--muted);
      margin: 0 0 14px;
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .selector {
      display: grid;
      gap: 10px;
    }

    .doc-link {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      text-decoration: none;
      padding: 10px 12px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .doc-link:hover {
      border-color: rgba(79, 140, 255, 0.55);
      background: rgba(79, 140, 255, 0.08);
    }

    .doc-link strong {
      display: block;
      margin-bottom: 2px;
      font-size: 0.95rem;
    }

    .doc-link span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .main {
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 18px;
    }

    .panel h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.7rem;
      margin: 0 0 4px;
      color: var(--text);
      font-weight: 500;
    }

    .panel .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    #uploader {
      min-height: 220px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }

    .card h3 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 0.92rem;
      font-weight: 500;
      color: #d8deea;
    }

    .photo-box {
      aspect-ratio: 4 / 3;
      background: #0a0f16;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .info-box {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      padding: 12px;
    }

    .info-box h3 {
      margin: 0 0 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      color: var(--gold);
      font-size: 1rem;
    }

    .info-list {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    .info-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      padding: 9px 11px;
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 8px;
      align-items: start;
    }

    .info-item .label {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.3;
      margin-top: 2px;
    }

    .info-item .value {
      color: #e6ebf7;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.3;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .info-list {
        grid-template-columns: 1fr;
      }

      .info-item {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .info-item .label {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="side">
      <div class="brand">VendeOro</div>
      <p>Escanea y sube el documento desde movil. Al terminar, se muestran imagenes y datos extraidos.</p>
      <div id="selector" class="selector"></div>
    </aside>

    <main class="main">
      <section class="panel">
        <h2 id="title">Carga de documento</h2>
        <p class="sub">Flujo mobile upload + extraccion JSON</p>
      </section>

      <section class="panel" id="uploader"></section>

      <section class="panel" id="result-panel" style="display:none;">
        <div class="result-grid">
          <article class="card">
            <h3>Anverso</h3>
            <div id="front-photo" class="photo-box">Sin imagen</div>
          </article>
          <article class="card">
            <h3>Reverso</h3>
            <div id="back-photo" class="photo-box">Sin imagen</div>
          </article>
          <article class="info-box">
            <h3>Datos extraidos</h3>
            <div id="info-list" class="info-list"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="/widget.js"></script>
  <script>
    const DOC_LABELS = {
      dni: { title: 'DNI', subtitle: '2 fotos: anverso y reverso' },
      nie: { title: 'NIE', subtitle: '2 fotos: anverso y reverso' },
      driver: { title: 'Permiso de conducir', subtitle: '2 fotos: anverso y reverso' },
      passport: { title: 'Pasaporte', subtitle: '1 foto: pagina de datos' }
    };

    const pageParams = new URLSearchParams(window.location.search);
    const docType = pageParams.get('docType');
    const validDocTypes = Object.keys(DOC_LABELS);

    buildSelector();

    if (validDocTypes.includes(docType)) {
      const label = DOC_LABELS[docType];
      document.getElementById('title').textContent = `${label.title} - ${label.subtitle}`;

      MobileUpload.init('uploader', {
        serverUrl: window.location.origin,
        docType
      }).then((result) => {
        renderResult(result);
      }).catch((error) => {
        document.getElementById('uploader').innerHTML = `<p style="color:#d66e6e">Error: ${error.message}</p>`;
      });
    } else {
      document.getElementById('uploader').innerHTML =
        '<p style="color:#96a2b8; margin:0;">Selecciona un tipo de documento en el panel izquierdo.</p>';
    }

    function buildSelector() {
      const selector = document.getElementById('selector');
      const base = window.location.origin + window.location.pathname;
      selector.innerHTML = '';

      validDocTypes.forEach((key) => {
        const item = DOC_LABELS[key];
        const link = document.createElement('a');
        link.className = 'doc-link';
        link.href = `${base}?docType=${key}`;
        link.innerHTML = `<strong>${item.title}</strong><span>${item.subtitle}</span>`;
        selector.appendChild(link);
      });
    }

    function renderResult(result) {
      const panel = document.getElementById('result-panel');
      panel.style.display = 'block';

      const front = result && result.photosBySlot ? result.photosBySlot.front : null;
      const back = result && result.photosBySlot ? result.photosBySlot.back : null;

      setPhoto('front-photo', front, 'Anverso');
      setPhoto('back-photo', back, 'Reverso');

      renderExtractedInfo(result.documentData || {});
    }

    function setPhoto(targetId, url, alt) {
      const el = document.getElementById(targetId);
      if (!url) {
        el.textContent = 'Sin imagen';
        return;
      }
      el.innerHTML = `<img src="${url}" alt="${alt}" />`;
    }

    function renderExtractedInfo(data) {
      const front = data && data.front ? data.front : {};
      const back = data && data.back ? data.back : {};
      const infoList = document.getElementById('info-list');

      const fields = [
        { label: 'ID type', value: data.documentType },
        { label: 'ID number', value: front.dniNumber || front.documentNumber || front.idNumber },
        { label: 'Nombre', value: front.name || front.firstName },
        { label: 'Apellidos', value: Array.isArray(front.surnames) ? front.surnames.join(' ') : (front.surnames || front.lastName) },
        { label: 'Direccion', value: formatAddress(back.address) },
        { label: 'Fecha nacimiento', value: front.dateOfBirth || front.birthDate },
        { label: 'Lugar de nacimiento', value: formatBirthPlace(back.placeOfBirth) },
        { label: 'Fecha de caducidad', value: front.dateOfExpiry || front.expiryDate }
      ];

      infoList.innerHTML = fields
        .map((field) => {
          const value = field.value ? String(field.value) : 'No disponible';
          return `
            <div class="info-item">
              <div class="label">${field.label}</div>
              <div class="value">${value}</div>
            </div>
          `;
        })
        .join('');
    }

    function formatAddress(address) {
      if (!address || typeof address !== 'object') return null;
      const parts = [address.street, address.city, address.province].filter(Boolean);
      return parts.length ? parts.join(', ') : null;
    }

    function formatBirthPlace(place) {
      if (!place || typeof place !== 'object') return null;
      const parts = [place.city, place.provinceOrCountry].filter(Boolean);
      return parts.length ? parts.join(', ') : null;
    }
  </script>
</body>
</html>
