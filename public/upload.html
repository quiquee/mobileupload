<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Enviar documento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05070b;
      --panel: #10141d;
      --panel-2: #0d121a;
      --line: rgba(255, 255, 255, 0.12);
      --line-soft: rgba(255, 255, 255, 0.08);
      --text: #e8ebf1;
      --muted: #9ca6b8;
      --gold: #cfad63;
      --success: #5db784;
      --error: #d66e6e;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 15% 0%, rgba(43, 56, 86, 0.45), transparent 45%), var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      display: flex;
      justify-content: center;
      padding: 22px 14px 30px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      padding: 8px 2px 10px;
    }

    .doc-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 2px;
    }

    .doc-link {
      font-family: 'Outfit', sans-serif;
      font-size: 1.12rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #b7c0d1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .doc-link.active {
      color: var(--gold);
      border-color: rgba(207, 173, 99, 0.65);
      background: rgba(207, 173, 99, 0.08);
    }

    .doc-link:active {
      transform: translateY(1px);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .upload-card {
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.12s ease;
    }

    .upload-card:active {
      transform: scale(0.995);
    }

    .upload-card.ready {
      border-color: rgba(93, 183, 132, 0.45);
    }

    .card-top {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
    }

    .card-title {
      color: #d9deea;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .card-action {
      color: #dbe2ef;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.02);
    }

    .card-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #0a0f16;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-frame img,
    .card-frame svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .rotate-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(5, 7, 11, 0.78);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .rotate-btn.top {
      top: 10px;
    }

    .rotate-btn.bottom {
      bottom: 10px;
    }

    .rotate-btn:active {
      background: rgba(255, 255, 255, 0.16);
    }

    .rotate-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .rotate-btn svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .rotate-btn.left svg {
      transform: scaleX(-1);
    }

    .actions {
      margin-top: 8px;
    }

    #btn-finish {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      background: linear-gradient(90deg, #bc9a56 0%, #dec17d 100%);
      color: #1d1b16;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: none;
    }

    #btn-finish:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #status {
      min-height: 24px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    #status.success {
      color: var(--success);
    }

    #status.error {
      color: var(--error);
    }

    #status.processing {
      color: var(--gold);
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <nav class="doc-switch" id="doc-switch"></nav>
    </header>

    <section id="cards" class="cards"></section>

    <section class="actions">
      <button id="btn-finish" type="button">Terminar</button>
      <div id="status"></div>
    </section>

    <input id="picker" type="file" accept="image/*" capture="environment" />
  </main>

  <script>
    const DOC_TYPES = {
      passport: {
        title: 'Pasaporte',
        sides: [{ slot: 'front', label: 'Pagina de datos' }]
      },
      dni: {
        title: 'DNI',
        sides: [
          { slot: 'front', label: 'Anverso - cara con foto' },
          { slot: 'back', label: 'Reverso' }
        ]
      },
      nie: {
        title: 'NIE',
        sides: [
          { slot: 'front', label: 'Anverso - cara con foto' },
          { slot: 'back', label: 'Reverso' }
        ]
      },
      driver: {
        title: 'Permiso de conducir',
        sides: [
          { slot: 'front', label: 'Anverso' },
          { slot: 'back', label: 'Reverso' }
        ]
      }
    };

    const SAMPLE_SVGS = {
      front: simpleDocSvg('ANVERSO'),
      back: simpleDocSvg('REVERSO')
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    let currentDocTypeKey = params.get('docType') || 'dni';
    let docCfg = DOC_TYPES[currentDocTypeKey] || DOC_TYPES.dni;
    const serverUrl = window.location.origin;

    const cardsEl = document.getElementById('cards');
    const pickerEl = document.getElementById('picker');
    const finishBtn = document.getElementById('btn-finish');
    const docSwitchEl = document.getElementById('doc-switch');

    const selectedBySlot = {};
    let activeSlot = null;

    renderDocSwitch();
    if (!id) {
      setStatus('Enlace no valido.', 'error');
      finishBtn.disabled = true;
    } else {
      fetch(`${serverUrl}/api/mobile-ready/${id}`).catch(() => undefined);
    }

    renderCards();

    pickerEl.addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file || !activeSlot) return;

      let finalFile = file;
      try {
        finalFile = await normalizeCaptureOrientation(file);
      } catch (err) {
        console.error('No se pudo normalizar la orientacion, se usa el archivo original:', err);
      }

      const prev = selectedBySlot[activeSlot];
      if (prev && prev.previewUrl) URL.revokeObjectURL(prev.previewUrl);

      selectedBySlot[activeSlot] = {
        file: finalFile,
        previewUrl: URL.createObjectURL(finalFile)
      };

      renderCards();
      event.target.value = '';
      setStatus('');
    });

    finishBtn.addEventListener('click', async () => {
      if (!id) return;
      if (!allRequiredSelected()) return;

      finishBtn.disabled = true;
      setStatus('Procesando documento...', 'processing');

      const body = new FormData();
      body.append('docType', currentDocTypeKey);
      docCfg.sides.forEach((side) => {
        const entry = selectedBySlot[side.slot];
        if (entry && entry.file) {
          body.append(side.slot, entry.file, entry.file.name);
        }
      });

      try {
        const response = await fetch(`${serverUrl}/api/complete/${id}`, {
          method: 'POST',
          body
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          const msg = data && data.error ? data.error : 'No se pudo completar';
          const trace = data && data.traceId ? ` traceId=${data.traceId}` : '';
          throw new Error(`${msg}${trace}`);
        }

        setStatus('Documento procesado. Ya puedes cerrar esta ventana.', 'success');
        finishBtn.textContent = 'Terminado';
      } catch (error) {
        const traceId = error && error.message && /traceId=/.test(error.message)
          ? error.message.split('traceId=')[1]
          : null;
        console.error('Error al procesar documento:', error);
        if (traceId) {
          setStatus(`Error al procesar el documento. Trace: ${traceId}`, 'error');
        } else {
          setStatus('Error al procesar el documento.', 'error');
        }
        finishBtn.disabled = false;
      }
    });

    function renderCards() {
      cardsEl.innerHTML = '';

      docCfg.sides.forEach((side) => {
        const hasPhoto = !!selectedBySlot[side.slot];
        const card = document.createElement('article');
        card.className = `upload-card${hasPhoto ? ' ready' : ''}`;
        card.dataset.slot = side.slot;

        const top = document.createElement('div');
        top.className = 'card-top';
        top.innerHTML = `<div class="card-title">${side.label}</div>`;

        const cardAction = document.createElement('div');
        cardAction.className = 'card-action';
        cardAction.textContent = 'Toca para Subir/Cambiar Foto';

        const frame = document.createElement('div');
        frame.className = 'card-frame';

        if (hasPhoto) {
          const img = document.createElement('img');
          img.src = selectedBySlot[side.slot].previewUrl;
          img.alt = side.label;
          frame.appendChild(img);
        } else {
          frame.innerHTML = SAMPLE_SVGS[side.slot] || SAMPLE_SVGS.front;
        }

        const rotateTop = createRotateButton('left', hasPhoto, async (ev) => {
          ev.stopPropagation();
          await rotateSelected(side.slot, -90);
        });

        const rotateBottom = createRotateButton('right', hasPhoto, async (ev) => {
          ev.stopPropagation();
          await rotateSelected(side.slot, 90);
        });

        frame.appendChild(rotateTop);
        frame.appendChild(rotateBottom);

        card.appendChild(top);
        card.appendChild(cardAction);
        card.appendChild(frame);

        card.addEventListener('click', () => {
          activeSlot = side.slot;
          pickerEl.click();
        });

        cardsEl.appendChild(card);
      });

      finishBtn.style.display = allRequiredSelected() ? 'block' : 'none';
    }

    function allRequiredSelected() {
      return docCfg.sides.every((side) => !!selectedBySlot[side.slot]);
    }

    function renderDocSwitch() {
      docSwitchEl.innerHTML = '';
      const options = [
        { key: 'dni', text: 'DNI' },
        { key: 'nie', text: 'NIE' },
        { key: 'passport', text: 'PASAPORTE' },
        { key: 'driver', text: 'CARNET' }
      ];

      options.forEach((option) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `doc-link${option.key === currentDocTypeKey ? ' active' : ''}`;
        button.textContent = option.text;
        button.addEventListener('click', () => {
          if (option.key === currentDocTypeKey) return;
          switchDocType(option.key);
        });
        docSwitchEl.appendChild(button);
      });
    }

    function switchDocType(nextKey) {
      currentDocTypeKey = nextKey;
      docCfg = DOC_TYPES[currentDocTypeKey] || DOC_TYPES.dni;
      activeSlot = null;

      Object.values(selectedBySlot).forEach((entry) => {
        if (entry && entry.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      });

      Object.keys(selectedBySlot).forEach((slot) => {
        delete selectedBySlot[slot];
      });

      const nextParams = new URLSearchParams(window.location.search);
      nextParams.set('docType', currentDocTypeKey);
      window.history.replaceState({}, '', `${window.location.pathname}?${nextParams.toString()}`);

      renderDocSwitch();
      renderCards();
      setStatus('');
      finishBtn.disabled = false;
      finishBtn.textContent = 'Terminar';
    }

    function setStatus(message, cls) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = cls || '';
    }

    function createRotateButton(direction, enabled, onClick) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `rotate-btn ${direction === 'left' ? 'left top' : 'right bottom'}`;
      button.title = direction === 'left' ? 'Rotar a la izquierda' : 'Rotar a la derecha';
      button.disabled = !enabled;
      button.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 4v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M20 10a8 8 0 1 0 2.2 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      `;

      button.addEventListener('click', onClick);
      return button;
    }

    async function rotateSelected(slot, degrees) {
      const current = selectedBySlot[slot];
      if (!current || !current.file) {
        return;
      }

      try {
        const rotatedFile = await rotateImageFile(current.file, degrees);
        if (current.previewUrl) URL.revokeObjectURL(current.previewUrl);

        selectedBySlot[slot] = {
          file: rotatedFile,
          previewUrl: URL.createObjectURL(rotatedFile)
        };

        renderCards();
        setStatus('');
      } catch (err) {
        console.error('Error rotando la imagen:', err);
        setStatus('No se pudo rotar la imagen.', 'error');
      }
    }

    async function normalizeCaptureOrientation(file) {
      const orientation = await readExifOrientation(file);
      const inferredRotation = orientationToRotation(orientation);
      const rotation = inferredRotation === null ? 90 : inferredRotation;

      if (rotation === 0) {
        return file;
      }

      return rotateImageFile(file, rotation);
    }

    function orientationToRotation(orientation) {
      if (orientation === 1) return 0;
      if (orientation === 3) return 180;
      if (orientation === 6) return 90;
      if (orientation === 8) return -90;
      return null;
    }

    async function readExifOrientation(file) {
      if (!file || !file.type || !file.type.includes('jpeg')) {
        return null;
      }

      const buffer = await file.arrayBuffer();
      const view = new DataView(buffer);

      if (view.getUint16(0, false) !== 0xFFD8) return null;

      let offset = 2;
      while (offset < view.byteLength) {
        const marker = view.getUint16(offset, false);
        offset += 2;

        if (marker === 0xFFE1) {
          const exifLength = view.getUint16(offset, false);
          offset += 2;

          if (view.getUint32(offset, false) !== 0x45786966) return null;

          const tiffOffset = offset + 6;
          const little = view.getUint16(tiffOffset, false) === 0x4949;
          const firstIfdOffset = view.getUint32(tiffOffset + 4, little);
          let dirOffset = tiffOffset + firstIfdOffset;
          const entries = view.getUint16(dirOffset, little);
          dirOffset += 2;

          for (let i = 0; i < entries; i += 1) {
            const entryOffset = dirOffset + (i * 12);
            const tag = view.getUint16(entryOffset, little);
            if (tag === 0x0112) {
              return view.getUint16(entryOffset + 8, little);
            }
          }

          offset += exifLength - 2;
        } else if ((marker & 0xff00) !== 0xff00) {
          break;
        } else {
          offset += view.getUint16(offset, false);
        }
      }

      return null;
    }

    async function rotateImageFile(file, degrees) {
      const source = await createImageBitmap(file);
      const radians = (degrees * Math.PI) / 180;
      const sin = Math.abs(Math.sin(radians));
      const cos = Math.abs(Math.cos(radians));
      const width = Math.round((source.width * cos) + (source.height * sin));
      const height = Math.round((source.width * sin) + (source.height * cos));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d');
      ctx.translate(width / 2, height / 2);
      ctx.rotate(radians);
      ctx.drawImage(source, -source.width / 2, -source.height / 2);

      const blob = await new Promise((resolve) => {
        canvas.toBlob(resolve, file.type || 'image/jpeg', 0.92);
      });

      if (!blob) {
        return file;
      }

      return new File([blob], file.name, {
        type: blob.type || file.type || 'image/jpeg',
        lastModified: Date.now()
      });
    }

    function simpleDocSvg(label) {
      return `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#d8dde8" />
              <stop offset="100%" stop-color="#bcc5d8" />
            </linearGradient>
          </defs>
          <rect width="640" height="480" fill="#0d121a" />
          <rect x="68" y="56" width="504" height="368" rx="22" fill="url(#g)" />
          <rect x="68" y="56" width="504" height="76" rx="22" fill="#273b64" />
          <rect x="68" y="56" width="20" height="76" rx="22" fill="#bc3d43" />
          <rect x="106" y="182" width="124" height="158" rx="12" fill="#aeb4c3" />
          <rect x="264" y="198" width="230" height="18" rx="6" fill="#9ba7bf" />
          <rect x="264" y="228" width="188" height="18" rx="6" fill="#9ba7bf" />
          <rect x="264" y="274" width="210" height="16" rx="6" fill="#9ba7bf" />
          <rect x="264" y="304" width="154" height="16" rx="6" fill="#9ba7bf" />
          <text x="320" y="110" text-anchor="middle" fill="#f2f4f9" font-size="36" font-family="Outfit, sans-serif" letter-spacing="3">${label}</text>
        </svg>
      `;
    }
  </script>
</body>
</html>
