<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar fotografía</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0d0d0d;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(184,142,40,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(184,142,40,0.06) 0%, transparent 55%);
      font-family: 'Montserrat', sans-serif;
      color: #c9a84c;
      padding: 40px 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      opacity: 0.55;
    }
    .ornament-line {
      width: 56px; height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c);
    }
    .ornament-line.r { background: linear-gradient(to left, transparent, #c9a84c); }
    .ornament-diamond {
      width: 7px; height: 7px;
      border: 1px solid #c9a84c;
      transform: rotate(45deg);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #9a7a28 0%, #e8c96d 40%, #f5e090 55%, #c9a84c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.6rem;
      font-weight: 200;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #7a6030;
      margin-bottom: 36px;
      text-align: center;
    }

    /* Preview area */
    #preview-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
      display: none;
      background: #111;
      position: relative;
    }
    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder box */
    #placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px dashed rgba(201,168,76,0.25);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      gap: 10px;
      color: rgba(201,168,76,0.35);
    }
    #placeholder svg { width: 40px; height: 40px; opacity: 0.4; }
    #placeholder span {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px 8px;
      border: none;
      border-radius: 3px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: linear-gradient(135deg, #9a7a28, #c9a84c);
      color: #0d0d0d;
    }
    .btn-secondary {
      background: transparent;
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.35);
    }
    .btn-send {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #9a7a28 0%, #e8c96d 50%, #c9a84c 100%);
      color: #0d0d0d;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-bottom: 12px;
      display: none;
      transition: opacity 0.2s;
    }
    .btn-send:active { opacity: 0.8; }

    input[type=file] { display: none; }

    #status {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      min-height: 20px;
      color: rgba(201,168,76,0.6);
    }
    #status.success { color: #7db87d; }
    #status.error { color: #c0665a; }
    #status.uploading { color: #c9a84c; }

    .another-btn {
      display: none;
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.35);
      color: #c9a84c;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .another-btn:hover { background: rgba(201,168,76,0.07); }

    .counter {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.4);
      margin-top: 24px;
    }
    .counter span { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>

    <h1>Fotografía</h1>
    <div class="subtitle">Envío de imágenes</div>

    <div id="placeholder">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
          d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span>Selecciona una fotografía</span>
    </div>

    <div id="preview-wrap"><img id="preview" alt="Vista previa" /></div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="document.getElementById('camera-input').click()">Cámara</button>
      <button class="btn btn-secondary" onclick="document.getElementById('gallery-input').click()">Galería</button>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" />
    <input type="file" id="gallery-input" accept="image/*" />

    <button class="btn-send" id="btn-send" onclick="sendPhoto()">Enviar fotografía</button>
    <div id="status"></div>

    <button class="another-btn" id="btn-another" onclick="resetForm()">+ Añadir otra fotografía</button>
    <div class="counter" id="counter" style="display:none">
      Fotos enviadas: <span id="count">0</span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const serverUrl = window.location.origin;
    let selectedFile = null;
    let photoCount = 0;

    if (!id) {
      document.getElementById('status').textContent = 'Enlace no válido.';
      document.getElementById('status').className = 'error';
    } else {
      fetch(`${serverUrl}/api/mobile-ready/${id}`);
    }

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      const preview = document.getElementById('preview');
      preview.src = URL.createObjectURL(file);
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('btn-send').style.display = 'block';
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = '';
    }

    document.getElementById('camera-input').addEventListener('change', e => handleFile(e.target.files[0]));
    document.getElementById('gallery-input').addEventListener('change', e => handleFile(e.target.files[0]));

    function sendPhoto() {
      if (!selectedFile) return;
      const status = document.getElementById('status');
      const btn = document.getElementById('btn-send');

      status.textContent = 'Enviando...';
      status.className = 'uploading';
      btn.disabled = true;
      btn.style.opacity = '0.5';

      const formData = new FormData();
      formData.append('photo', selectedFile);

      fetch(`${serverUrl}/api/upload/${id}`, { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.ok) {
            photoCount++;
            document.getElementById('count').textContent = photoCount;
            document.getElementById('counter').style.display = 'block';
            status.textContent = 'Fotografía enviada';
            status.className = 'success';
            btn.style.display = 'none';
            document.getElementById('btn-another').style.display = 'block';
          } else {
            status.textContent = 'Error al enviar';
            status.className = 'error';
            btn.disabled = false;
            btn.style.opacity = '1';
          }
        })
        .catch(() => {
          status.textContent = 'Error de conexión';
          status.className = 'error';
          btn.disabled = false;
          btn.style.opacity = '1';
        });
    }

    function resetForm() {
      selectedFile = null;
      document.getElementById('camera-input').value = '';
      document.getElementById('gallery-input').value = '';
      document.getElementById('preview').src = '';
      document.getElementById('preview-wrap').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      document.getElementById('btn-send').style.display = 'none';
      document.getElementById('btn-send').disabled = false;
      document.getElementById('btn-send').style.opacity = '1';
      document.getElementById('btn-another').style.display = 'none';
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = '';
    }
  </script>
</body>
</html>
