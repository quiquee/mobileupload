<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Enviar documento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background-color: #0d0d0d;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(184,142,40,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(184,142,40,0.06) 0%, transparent 55%);
      font-family: 'Montserrat', sans-serif;
      color: #c9a84c;
      padding: 32px 20px 48px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ─────────────────────────────────────────── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      opacity: 0.55;
      width: 100%;
    }
    .ornament-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c);
    }
    .ornament-line.r { background: linear-gradient(to left, transparent, #c9a84c); }
    .ornament-diamond {
      width: 7px; height: 7px;
      border: 1px solid #c9a84c;
      transform: rotate(45deg);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #9a7a28 0%, #e8c96d 40%, #f5e090 55%, #c9a84c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.58rem;
      font-weight: 200;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #7a6030;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ── Step indicator ──────────────────────────────────── */
    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      width: 100%;
    }
    .step-pill {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(201,168,76,0.15);
      transition: background 0.4s;
    }
    .step-pill.active { background: rgba(201,168,76,0.6); }
    .step-pill.done   { background: rgba(125,184,125,0.7); }

    /* ── Side label ──────────────────────────────────────── */
    .side-label {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.7);
      margin-bottom: 16px;
      text-align: center;
    }

    /* ── Sample mockup ───────────────────────────────────── */
    .sample-wrap {
      width: 100%;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .sample-label {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.3);
    }
    .sample-img {
      width: 100%;
      max-width: 300px;
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 4px;
      opacity: 0.55;
    }

    /* ── Preview area ────────────────────────────────────── */
    #preview-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
      display: none;
      background: #111;
      position: relative;
    }
    #preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.3s ease;
    }

    /* Rotation button — appears inside preview-wrap */
    #btn-rotate {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      background: rgba(13,13,13,0.75);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      transition: background 0.2s;
    }
    #btn-rotate:active { background: rgba(201,168,76,0.2); }
    #btn-rotate svg { width: 16px; height: 16px; stroke: #c9a84c; }

    /* ── Placeholder ─────────────────────────────────────── */
    #placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px dashed rgba(201,168,76,0.25);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      gap: 10px;
      color: rgba(201,168,76,0.35);
    }
    #placeholder svg { width: 40px; height: 40px; opacity: 0.4; }
    #placeholder span {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px 8px;
      border: none;
      border-radius: 3px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: linear-gradient(135deg, #9a7a28, #c9a84c);
      color: #0d0d0d;
    }
    .btn-secondary {
      background: transparent;
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.35);
    }

    .btn-send {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #9a7a28 0%, #e8c96d 50%, #c9a84c 100%);
      color: #0d0d0d;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-bottom: 12px;
      display: none;
      transition: opacity 0.2s;
    }
    .btn-send:active { opacity: 0.8; }
    .btn-send:disabled { opacity: 0.4; cursor: default; }

    input[type=file] { display: none; }

    #status {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      min-height: 20px;
      color: rgba(201,168,76,0.6);
      margin-bottom: 8px;
    }
    #status.success  { color: #7db87d; }
    #status.error    { color: #c0665a; }
    #status.uploading{ color: #c9a84c; }

    /* ── Completion screen ───────────────────────────────── */
    #done-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 24px 0;
      width: 100%;
    }
    .done-icon {
      width: 52px; height: 52px;
      border: 1px solid rgba(125,184,125,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .done-icon svg { width: 24px; height: 24px; stroke: #7db87d; }
    .done-text {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #7db87d;
      text-align: center;
    }
    .done-sub {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.3);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>

    <h1 id="doc-title">Documento</h1>
    <div class="subtitle" id="doc-subtitle">Envío de imágenes</div>

    <!-- Intro screen (explains required photos) -->
    <div id="intro-screen" style="display:none; flex-direction:column; align-items:center; width:100%; gap:16px;">
      <div class="side-label" style="margin-bottom:0" id="intro-title">Se requieren 2 fotografías</div>
      <div id="intro-mockups" style="display:flex; flex-direction:column; gap:12px; width:100%; align-items:center; margin-bottom: 8px; opacity: 0.7;"></div>
      <button class="btn-send" style="display:block;" onclick="startCapture()">Comenzar</button>
    </div>

    <!-- Capture screen -->
    <div id="capture-screen" style="display:none; flex-direction:column; align-items:center; width:100%;">
      <!-- Step pills (hidden for passport / single-photo) -->
      <div class="steps" id="steps-wrap" style="display:none">
        <div class="step-pill active" id="step-0"></div>
        <div class="step-pill" id="step-1"></div>
      </div>

      <!-- Side indicator -->
      <div class="side-label" id="side-label"></div>

      <!-- Sample mockup SVG -->
      <div class="sample-wrap" id="sample-wrap">
        <div class="sample-label" id="sample-label-text">Modelo de referencia</div>
        <div id="sample-img-container"></div>
      </div>

    <!-- Photo area -->
    <div id="placeholder">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
          d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span>Selecciona una fotografía de la camara o la galeria</span>
    </div>

    <div id="preview-wrap">
      <img id="preview" alt="Vista previa" />
      <button id="btn-rotate" title="Rotar imagen" onclick="rotatePreview()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0114.7-5.7M20 15a9 9 0 01-14.7 5.7"/>
        </svg>
      </button>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="document.getElementById('camera-input').click()">Cámara</button>
      <button class="btn btn-secondary" onclick="document.getElementById('gallery-input').click()">Galería</button>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" />
      <input type="file" id="gallery-input" accept="image/*" />

      <button class="btn-send" id="btn-send" onclick="sendPhoto()">Enviar fotografía</button>
      <div id="status"></div>
    </div> <!-- /capture-screen -->

    <!-- Completion screen -->
    <div id="done-screen">
      <div class="done-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <polyline points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-text" id="done-text">Documento enviado</div>
      <div class="done-sub">Puede cerrar esta ventana</div>
    </div>
  </div>

    const DRIVER_BACK_SVG = `

  <rect x="48" y="81" width="36" height="6" rx="1" fill="#c8d0da"/>
  <rect x="96" y="81" width="36" height="6" rx="1" fill="#c8d0da"/>
  <!-- Barcode -->
  <g transform="translate(10,110)">
    <rect x="0"  y="0" width="2"  height="50" fill="#333" opacity="0.4"/>

    <rect x="10" y="0" width="1"  height="50" fill="#333" opacity="0.4"/>

    // ── Doc-type config ──────────────────────────────────────────────────────
    const DOC_TYPES = {
      passport: {
        title:    'Pasaporte',
        subtitle: 'Envío de imagen',
        sides: [
          { slot: 'front', label: 'Página de datos', sample: PASSPORT_SVG },
        ],
      },
      dni: {
        title:    'DNI',
        subtitle: 'Envío de imágenes',
        sides: [
          { slot: 'front', label: 'Anverso — cara con foto', sample: DNI_FRONT_SVG },
          { slot: 'back',  label: 'Reverso',                 sample: DNI_BACK_SVG  },
        ],
      },
      nie: {
        title:    'NIE',
        subtitle: 'Envío de imágenes',
        sides: [
          { slot: 'front', label: 'Anverso — cara con foto', sample: NIE_FRONT_SVG },
          { slot: 'back',  label: 'Reverso',                 sample: NIE_BACK_SVG  },
        ],
      },
      driver: {
        title:    'Permiso de conducir',
        subtitle: 'Envío de imágenes',
        sides: [
          { slot: 'front', label: 'Anverso — cara con foto', sample: DRIVER_FRONT_SVG },
          { slot: 'back',  label: 'Reverso',                 sample: DRIVER_BACK_SVG  },
        ],
      },
    };

    // ── Runtime state ────────────────────────────────────────────────────────
    const params    = new URLSearchParams(window.location.search);
    const id        = params.get('id');
    const docTypeKey= params.get('docType') || 'dni';
    const serverUrl = window.location.origin;

    const docCfg    = DOC_TYPES[docTypeKey] || DOC_TYPES.dni;
    const totalSides= docCfg.sides.length;
    let   sideIndex = 0;       // which side we're currently capturing
    let   selectedFile  = null;
    let   currentRotation = 0; // degrees

    // ── Init page ────────────────────────────────────────────────────────────
    document.getElementById('doc-title').textContent    = docCfg.title;
    document.getElementById('doc-subtitle').textContent = docCfg.subtitle;

    if (!id) {
      setStatus('Enlace no válido.', 'error');
    } else {
      fetch(`${serverUrl}/api/mobile-ready/${id}`)
        .catch(e => console.error('Notify server error', e));

      // Show intro screen first
      showIntro();
    }

    function showIntro() {
      const introScreen = document.getElementById('intro-screen');
      const introMockups = document.getElementById('intro-mockups');
      const introTitle = document.getElementById('intro-title');
      
      introScreen.style.display = 'flex';
      
      introTitle.textContent = totalSides > 1 ? `Se requieren ${totalSides} fotografías` : 'Se requiere 1 fotografía';
      
      introMockups.innerHTML = '';
      docCfg.sides.forEach(side => {
        // Wrap each sample to define max-width
        introMockups.innerHTML += `
          <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
            <div style="font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(201,168,76,0.5); margin-bottom:4px;">${side.label}</div>
            ${side.sample}
          </div>
        `;
      });
    }

    function startCapture() {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('capture-screen').style.display = 'flex';
      
      if (totalSides > 1) {
        document.getElementById('steps-wrap').style.display = 'flex';
      }
      renderSide(0);
    }

    function renderSide(idx) {
      sideIndex       = idx;
      selectedFile    = null;
      currentRotation = 0;

      const side = docCfg.sides[idx];

      // Update step pills
      for (let i = 0; i < totalSides; i++) {
        const pill = document.getElementById(`step-${i}`);
        if (!pill) continue;
        pill.className = 'step-pill ' + (i < idx ? 'done' : i === idx ? 'active' : '');
      }

      // Side label
      document.getElementById('side-label').textContent = side.label;

      // Sample SVG
      document.getElementById('sample-img-container').innerHTML = side.sample;

      // Reset photo area
      resetPhotoArea();
      setStatus('');

      // Update send button label
      const btnSend = document.getElementById('btn-send');
      const isLast  = idx === totalSides - 1;
      btnSend.textContent = isLast ? 'Enviar fotografía' : 'Enviar y continuar';
    }

    function resetPhotoArea() {
      document.getElementById('preview').src = '';
      document.getElementById('preview').style.transform = '';
      document.getElementById('preview-wrap').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      document.getElementById('btn-send').style.display = 'none';
      document.getElementById('btn-send').disabled = false;
      document.getElementById('btn-send').style.opacity = '1';
      document.getElementById('camera-input').value = '';
      document.getElementById('gallery-input').value = '';
      selectedFile    = null;
      currentRotation = 0;
    }

    function rotatePreview() {
      currentRotation = (currentRotation + 90) % 360;
      document.getElementById('preview').style.transform =
        `rotate(${currentRotation}deg)`;
    }

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      currentRotation = 0;
      const preview = document.getElementById('preview');
      preview.style.transform = '';
      preview.src = URL.createObjectURL(file);
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('btn-send').style.display = 'block';
      setStatus('');
    }

    document.getElementById('camera-input').addEventListener('change', e => handleFile(e.target.files[0]));
    document.getElementById('gallery-input').addEventListener('change', e => handleFile(e.target.files[0]));

    function sendPhoto() {
      if (!selectedFile) return;
      const btn  = document.getElementById('btn-send');
      const slot = docCfg.sides[sideIndex].slot;

      setStatus('Enviando...', 'uploading');
      btn.disabled = true;
      btn.style.opacity = '0.5';

      // If the user rotated the image, we need to bake the rotation into the
      // file before uploading, so the server receives the correct orientation.
      applyRotationToFile(selectedFile, currentRotation)
        .then(finalFile => {
          const formData = new FormData();
          formData.append('photo', finalFile);
          formData.append('slot', slot);

          return fetch(`${serverUrl}/api/upload/${id}`, { method: 'POST', body: formData });
        })
        .then(r => r.json())
        .then(data => {
          if (data.ok) {
            const nextIdx = sideIndex + 1;
            if (nextIdx < totalSides) {
              setStatus('Foto enviada. Prepara el ' +
                (nextIdx === 1 ? 'reverso' : 'siguiente lado') + '.', 'success');
              setTimeout(() => renderSide(nextIdx), 900);
            } else {
              showDone();
            }
          } else {
            setStatus('Error al enviar', 'error');
            btn.disabled = false;
            btn.style.opacity = '1';
          }
        })
        .catch(() => {
          setStatus('Error de conexión', 'error');
          btn.disabled = false;
          btn.style.opacity = '1';
        });
    }

    /**
     * Returns a new Blob/File with the given rotation baked in via Canvas.
     * If rotation is 0, returns the original file unchanged.
     */
    function applyRotationToFile(file, degrees) {
      if (degrees === 0) return Promise.resolve(file);

      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const rad     = (degrees * Math.PI) / 180;
          const sin     = Math.abs(Math.sin(rad));
          const cos     = Math.abs(Math.cos(rad));
          const w       = img.width * cos + img.height * sin;
          const h       = img.width * sin + img.height * cos;

          const canvas  = document.createElement('canvas');
          canvas.width  = Math.round(w);
          canvas.height = Math.round(h);

          const ctx     = canvas.getContext('2d');
          ctx.translate(canvas.width / 2, canvas.height / 2);
          ctx.rotate(rad);
          ctx.drawImage(img, -img.width / 2, -img.height / 2);

          canvas.toBlob(blob => {
            if (!blob) { reject(new Error('Canvas toBlob failed')); return; }
            resolve(new File([blob], file.name, { type: file.type || 'image/jpeg' }));
          }, file.type || 'image/jpeg', 0.92);
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
        img.src = url;
      });
    }

    function showDone() {
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'none';
      document.querySelector('.btn-row').style.display = 'none';
      document.getElementById('btn-send').style.display = 'none';
      document.getElementById('sample-wrap').style.display = 'none';
      document.getElementById('side-label').style.display = 'none';
      document.getElementById('steps-wrap').style.display = 'none';
      setStatus('');

      const doneText = totalSides > 1 ? 'Documento enviado' : 'Fotografía enviada';
      document.getElementById('done-text').textContent = doneText;
      document.getElementById('done-screen').style.display = 'flex';
    }

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className   = cls || '';
    }
  </script>
